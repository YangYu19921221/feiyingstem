<!DOCTYPE html>
<html>
<head>
    <title>API测试</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        button { margin: 10px; padding: 10px; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>学生端API测试</h1>
    <button onclick="testLogin()">1. 登录</button>
    <button onclick="testGetBooks()">2. 获取单词本</button>
    <button onclick="testGetBookProgress()">3. 获取单词本进度</button>
    <button onclick="testStartLearning()">4. 开始学习</button>
    <div id="output"></div>

    <script>
        let token = '';
        const API_BASE = 'http://localhost:8000/api/v1';

        function log(title, data) {
            const output = document.getElementById('output');
            output.innerHTML += `<h3>${title}</h3><pre>${JSON.stringify(data, null, 2)}</pre>`;
        }

        async function testLogin() {
            const response = await fetch(`${API_BASE}/auth/login/json`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'student', password: '123456' })
            });
            const data = await response.json();
            token = data.access_token;
            log('登录成功', data);
        }

        async function testGetBooks() {
            const response = await fetch(`${API_BASE}/student/books`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            log('单词本列表', data);
        }

        async function testGetBookProgress() {
            const response = await fetch(`${API_BASE}/student/books/1/progress`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            log('单词本进度', data);
        }

        async function testStartLearning() {
            const response = await fetch(`${API_BASE}/student/units/1/start`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ unit_id: 1, learning_mode: 'flashcard' })
            });
            const data = await response.json();
            log('开始学习', data);
        }
    </script>
</body>
</html>
