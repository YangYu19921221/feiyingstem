<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 强制 360 / QQ / 搜狗 / UC 等双核浏览器使用极速（Chromium）内核 -->
    <meta name="renderer" content="webkit" />
    <meta name="force-rendering" content="webkit" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>飞鹰AI英语</title>
    <style>
      #legacy-browser-warning{position:fixed;top:0;left:0;right:0;z-index:99999;background:#FF6B35;color:#fff;padding:14px 20px;font:14px/1.6 -apple-system,"Microsoft YaHei",Arial,sans-serif;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
      #legacy-browser-warning b{font-size:16px;display:block;margin-bottom:4px}
      #legacy-browser-warning a{color:#FFD23F;text-decoration:underline;margin:0 6px}
    </style>
  </head>
  <body>
    <!--[if lt IE 11]>
      <div id="legacy-browser-warning">
        <b>⚠️ 您的浏览器版本过低，无法使用本系统</b>
        请升级到
        <a href="https://www.google.cn/chrome/" target="_blank">Chrome</a>、
        <a href="https://www.microsoft.com/edge" target="_blank">Edge</a>，
        或将 360/QQ 浏览器切换到「极速模式」
      </div>
    <![endif]-->
    <script>
      (function () {
        var ua = navigator.userAgent || '';
        var isIE = /MSIE |Trident\//.test(ua);
        var hasES2017 = false;
        try { new Function('return (async()=>{})')(); hasES2017 = true; } catch (e) {}
        if (isIE || !hasES2017 || !window.Promise || !window.fetch) {
          var div = document.createElement('div');
          div.id = 'legacy-browser-warning';
          div.innerHTML = '<b>⚠️ 浏览器版本过低，可能无法正常使用</b>'
            + '请升级到 <a href="https://www.google.cn/chrome/" target="_blank">Chrome</a>、'
            + '<a href="https://www.microsoft.com/edge" target="_blank">Edge</a>，'
            + '或将 360/QQ/搜狗浏览器切换到「极速模式」（地址栏右侧闪电/兼容图标）';
          if (document.body) document.body.appendChild(div);
          else document.addEventListener('DOMContentLoaded', function () { document.body.appendChild(div); });
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
